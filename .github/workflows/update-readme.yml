name: Update README

on:
  schedule:
    - cron: '0 0 * * *'   # daily at midnight UTC
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Fetch GitHub Pages repos and update README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'EOF'
          import json, urllib.request, re, sys, os

          token = os.environ.get("GH_TOKEN", "")
          page_num = 1
          repos = []
          while True:
              url = f"https://api.github.com/users/shiftyfoe/repos?per_page=100&page={page_num}"
              headers = {"Accept": "application/vnd.github+json"}
              if token:
                  headers["Authorization"] = f"Bearer {token}"
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read())
              if not data:
                  break
              repos.extend(data)
              page_num += 1

          repos = [r for r in repos if r.get("has_pages") and not r.get("archived") and not r.get("fork")]
          repos.sort(key=lambda r: r["name"])

          rows = ["| Project | Description | Live |",
                  "|---------|-------------|------|"]
          for r in repos:
              name = r['name']
              desc = r['description'] or ''
              homepage = r['homepage'] or f"https://shiftyfoe.github.io/{name}/"
              repo_url = r['html_url']
              rows.append(f"| [{name}]({repo_url}) | {desc} | [↗]({homepage}) |")

          table = "\n".join(rows)
          block = f"<!-- PROJECTS:START -->\n{table}\n<!-- PROJECTS:END -->"

          with open("README.md", "r") as f:
              content = f.read()

          updated = re.sub(
              r"<!-- PROJECTS:START -->.*?<!-- PROJECTS:END -->",
              block,
              content,
              flags=re.DOTALL
          )

          with open("README.md", "w") as f:
              f.write(updated)

          print("README updated.")
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (
            git add README.md &&
            git commit -m "chore: update projects list"
          )

      - name: Push
        run: git push
